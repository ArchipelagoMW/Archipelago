04/6230/: |
  ; Check if floodgate is open
  ld a,(wOverworldRoomFlags+$81)
  rlca
  ret c

  ; Add water to the entrance
  ld h,$cf
  ld l,$a7
  ld (hl),$fd ; water
  ld l,$97
  ld (hl),$fa ; shallow water
  ret

