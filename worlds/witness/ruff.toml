line-length = 120
target-version = "py310"

[lint]
select = ["B", "C", "E", "F", "R", "W", "I", "N", "Q", "TC", "UP", "RUF", "ISC", "PLC", "PLE", "PLW", "T20", "PERF"]
ignore = ["C901", "PLC0415"]

[lint.per-file-ignores]
# The way options definitions work right now, I am forced to break line length requirements.
"options.py" = ["E501"]
# The import list would just be so big if I imported every option individually in presets.py
"presets.py" = ["F403", "F405"]
# WorldTestBase.options should probably be a ClassVar. Since it's not, I'm just gonna ignore this rule.
"test/*.py" = ["RUF012"]
