# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: unittests

on:
  push:
    branches:
      - main
    paths:
      - '**'
      - '!docs/**'
      - '!deploy/**'
      - '!setup.py'
      - '!Dockerfile'
      - '!*.iss'
      - '!.gitignore'
      - '!.dockerignore'
      - '!.github/workflows/**'
      - '.github/workflows/unittests.yml'
  pull_request:
    paths:
      - '**'
      - '!docs/**'
      - '!deploy/**'
      - '!setup.py'
      - '!Dockerfile'
      - '!*.iss'
      - '!.gitignore'
      - '!.dockerignore'
      - '!.github/workflows/**'
      - '.github/workflows/unittests.yml'

concurrency:
  # Keep one in-flight unittests run per PR or branch and cancel stale runs.
  # For push events, include commit SHA so main-branch runs are not cancelled by newer pushes.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}-${{ github.event_name == 'push' && github.sha || '' }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  unit:
    runs-on: ${{ matrix.os }}
    name: Test Python ${{ matrix.python.version }} ${{ matrix.os }}
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python:
          - {version: '3.11.2'} # Change to '3.11' around 2026-06-10
          - {version: '3.12'}
          - {version: '3.13'}  # current
        include:
          - python: {version: '3.11'}  # old compat
            os: windows-latest
          - python: {version: '3.13'}  # current
            os: windows-latest
          - python: {version: '3.13'}  # current
            os: macos-latest

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python.version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python.version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r ci-requirements.txt
        python ModuleUpdate.py --yes --force --append "WebHostLib/requirements.txt"
        python Launcher.py --update_settings  # make sure host.yaml exists for tests
    - name: Unittests
      timeout-minutes: 15
      run: |
        pytest worlds/kirbyam/test -n auto --dist worksteal
    - name: Upload KirbyAM test logs on failure
      if: failure() || cancelled()
      uses: actions/upload-artifact@v4
      with:
        name: kirbyam-test-logs-${{ matrix.os }}-py${{ matrix.python.version }}
        path: test-output/kirbyam/**
        if-no-files-found: warn

  hosting:
    runs-on: ${{ matrix.os }}
    name: Test hosting with ${{ matrix.python.version }} on ${{ matrix.os }}
    timeout-minutes: 20

    strategy:
      matrix:
        os:
          - ubuntu-latest
        python:
          - {version: '3.13'}  # current

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python.version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python.version }}
    - name: Install dependencies
      run: |
        python -m venv venv
        source venv/bin/activate
        python -m pip install --upgrade pip
        python ModuleUpdate.py --yes --force --append "WebHostLib/requirements.txt"
    - name: Test hosting
      run: |
        source venv/bin/activate
        export PYTHONPATH=$(pwd)
        timeout 600 python test/hosting/__main__.py
