# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: unittests

on:
  push:
    paths:
      - '**'
      - '!docs/**'
      - '!deploy/**'
      - '!setup.py'
      - '!Dockerfile'
      - '!*.iss'
      - '!.gitignore'
      - '!.dockerignore'
      - '!.github/workflows/**'
      - '.github/workflows/unittests.yml'
  pull_request:
    paths:
      - '**'
      - '!docs/**'
      - '!deploy/**'
      - '!setup.py'
      - '!Dockerfile'
      - '!*.iss'
      - '!.gitignore'
      - '!.dockerignore'
      - '!.github/workflows/**'
      - '.github/workflows/unittests.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  unit:
    runs-on: ${{ matrix.os }}
    name: Test Python ${{ matrix.python.version }} ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python:
          - {version: '3.11.2'} # Change to '3.11' around 2026-06-10
          - {version: '3.12'}
          - {version: '3.13'}
        include:
          - python: {version: '3.11'}  # old compat
            os: windows-latest
          - python: {version: '3.13'}  # current
            os: windows-latest
          - python: {version: '3.13'}  # current
            os: macos-latest

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python.version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python.version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r ci-requirements.txt
        python ModuleUpdate.py --yes --force --append "WebHostLib/requirements.txt"
        python Launcher.py --update_settings  # make sure host.yaml exists for tests
    - name: Unittests
      run: |
        pytest worlds/kirbyam/test -n auto --dist worksteal
    - name: KirbyAM critical-module coverage gates
      if: matrix.os == 'ubuntu-latest' && matrix.python.version == '3.13'
      run: |
        pytest worlds/kirbyam/test -q --cov=worlds.kirbyam --cov-report=json:test-output/kirbyam/coverage.json
        python worlds/kirbyam/test/critical_module_coverage_gate.py \
          --coverage-json test-output/kirbyam/coverage.json \
          --thresholds-json worlds/kirbyam/test/critical_module_coverage_thresholds.json
    - name: Upload KirbyAM test logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: kirbyam-test-logs-${{ matrix.os }}-py${{ matrix.python.version }}
        path: test-output/kirbyam/**
        if-no-files-found: warn

  hosting:
    runs-on: ${{ matrix.os }}
    name: Test hosting with ${{ matrix.python.version }} on ${{ matrix.os }}

    strategy:
      matrix:
        os:
          - ubuntu-latest
        python:
          - {version: '3.13'}  # current

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python.version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python.version }}
    - name: Install dependencies
      run: |
        python -m venv venv
        source venv/bin/activate
        python -m pip install --upgrade pip
        python ModuleUpdate.py --yes --force --append "WebHostLib/requirements.txt"
    - name: Test hosting
      run: |
        source venv/bin/activate
        export PYTHONPATH=$(pwd)
        timeout 600 python test/hosting/__main__.py
