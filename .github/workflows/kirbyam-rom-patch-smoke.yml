name: KirbyAM ROM Patch Smoke

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/kirbyam-rom-patch-smoke.yml"
      - "worlds/kirbyam/**"
  pull_request:
    paths:
      - ".github/workflows/kirbyam-rom-patch-smoke.yml"
      - "worlds/kirbyam/**"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  patch-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make gcc-arm-none-eabi binutils-arm-none-eabi
          python -m pip install --upgrade pip
          python -m pip install bsdiff4

      - name: Create deterministic dummy base ROM for CI smoke
        run: |
          python - <<'PY'
          from pathlib import Path

          rom_path = Path("worlds/kirbyam/kirby_ap_payload/kirby.gba")
          rom_path.parent.mkdir(parents=True, exist_ok=True)
          rom = bytearray(0x200000)
          thumb_bl = bytes.fromhex("00 f0 00 f8")
          for offset in (0x001D952, 0x0000B144, 0x0000B0CC, 0x0000B264, 0x00039EEE):
            rom[offset:offset + 4] = thumb_bl
          rom_path.write_bytes(rom)
          PY

      - name: Build payload and generate ROM patch
        run: |
          python worlds/kirbyam/build.py --source-type arg --rom "$PWD/worlds/kirbyam/kirby_ap_payload/kirby.gba" --skip-install --non-interactive

      - name: Validate expected outputs exist
        run: |
          test -f worlds/kirbyam/data/base_patch.bsdiff4
          test -f worlds/kirbyam/kirbyam.apworld
          test -f worlds/kirbyam/kirby_ap_payload/payload.bin

      - name: Upload KirbyAM patch smoke artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kirbyam-rom-patch-smoke-artifacts
          path: |
            worlds/kirbyam/data/base_patch.bsdiff4
            worlds/kirbyam/kirbyam.apworld
            worlds/kirbyam/kirby_ap_payload/payload.bin
            worlds/kirbyam/kirby_ap_payload/patch_rom.log
          if-no-files-found: error
          retention-days: 14
