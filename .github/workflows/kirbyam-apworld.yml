name: KirbyAM APWorld

on:
  push:
    branches:
      - main
    tags:
      - "kirbyam-v*"
  pull_request:
    paths:
      - ".github/workflows/kirbyam-apworld.yml"
      - "worlds/kirbyam/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apworld:
    runs-on: ubuntu-latest
    outputs:
      apworld_name: ${{ steps.package.outputs.apworld_name }}
      release_name: ${{ steps.meta.outputs.release_name }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Show Python version
        run: |
          python --version

      - name: Build kirbyam.apworld
        working-directory: worlds/kirbyam
        run: |
          python build.py --skip-patch
          if [ ! -f kirbyam.apworld ]; then
            echo "kirbyam.apworld was not created" >&2
            exit 1
          fi
          ls -lh kirbyam.apworld

      - name: Prepare release metadata
        id: meta
        shell: bash
        run: |
          APWORLD_NAME="kirbyam.apworld"
          if [[ "${GITHUB_REF}" == refs/tags/kirbyam-v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/kirbyam-v}"
            APWORLD_NAME="kirbyam-${VERSION}.apworld"
            RELEASE_NAME="KirbyAM APWorld v${VERSION}"
            RELEASE_TAG="${GITHUB_REF#refs/tags/}"
          else
            RELEASE_NAME=""
            RELEASE_TAG=""
          fi
          echo "apworld_name=${APWORLD_NAME}" >> "${GITHUB_OUTPUT}"
          echo "release_name=${RELEASE_NAME}" >> "${GITHUB_OUTPUT}"
          echo "release_tag=${RELEASE_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Stage artifact
        id: package
        shell: bash
        run: |
          mkdir -p dist
          cp worlds/kirbyam/kirbyam.apworld "dist/${{ steps.meta.outputs.apworld_name }}"
          ls -lh dist
          echo "apworld_name=${{ steps.meta.outputs.apworld_name }}" >> "${GITHUB_OUTPUT}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.apworld_name }}
          path: dist/${{ steps.package.outputs.apworld_name }}
          if-no-files-found: error
          retention-days: 14

  release-apworld:
    if: startsWith(github.ref, 'refs/tags/kirbyam-v')
    runs-on: ubuntu-latest
    needs: build-apworld
    permissions:
      contents: write
    steps:
      - name: Download built artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-apworld.outputs.apworld_name }}
          path: dist

      - name: Publish release asset
        uses: softprops/action-gh-release@975c1b265e11dd76618af1c374e7981f9a6ff44a
        with:
          tag_name: ${{ needs.build-apworld.outputs.release_tag }}
          name: ${{ needs.build-apworld.outputs.release_name }}
          draft: true
          prerelease: false
          files: dist/${{ needs.build-apworld.outputs.apworld_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}