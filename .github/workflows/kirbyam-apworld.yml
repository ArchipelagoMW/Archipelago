name: KirbyAM APWorld

on:
  push:
    branches:
      - main
    tags:
      - "kirbyam-v*"
  pull_request:
    paths:
      - ".github/workflows/kirbyam-apworld.yml"
      - ".github/scripts/kirbyam_release_metadata.py"
      - "worlds/kirbyam/**"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-apworld:
    runs-on: ubuntu-latest
    outputs:
      apworld_name: ${{ steps.package.outputs.apworld_name }}
      release_name: ${{ steps.meta.outputs.release_name }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_enabled: ${{ steps.meta.outputs.release_enabled }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Show Python version
        run: |
          python --version

      - name: Prepare release metadata
        id: meta
        run: |
          python .github/scripts/kirbyam_release_metadata.py \
            --github-ref "${GITHUB_REF}" \
            --world-manifest "worlds/kirbyam/archipelago.json" \
            --changelog "worlds/kirbyam/CHANGELOG.md" \
            --github-output "${GITHUB_OUTPUT}"

      - name: Build kirbyam.apworld from source
        run: |
          python worlds/kirbyam/build.py --skip-patch --skip-install
          if [ ! -f worlds/kirbyam/kirbyam.apworld ]; then
            echo "kirbyam.apworld was not created" >&2
            exit 1
          fi
          if [ ! -s worlds/kirbyam/data/base_patch.bsdiff4 ]; then
            echo "Committed data/base_patch.bsdiff4 is missing or empty" >&2
            exit 1
          fi
          ls -lh worlds/kirbyam/kirbyam.apworld worlds/kirbyam/data/base_patch.bsdiff4
          sha256sum worlds/kirbyam/kirbyam.apworld worlds/kirbyam/data/base_patch.bsdiff4

      - name: Stage artifact
        id: package
        shell: bash
        run: |
          mkdir -p dist
          cp worlds/kirbyam/kirbyam.apworld "dist/${{ steps.meta.outputs.apworld_name }}"
          ls -lh dist
          echo "apworld_name=${{ steps.meta.outputs.apworld_name }}" >> "${GITHUB_OUTPUT}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.apworld_name }}
          path: dist/${{ steps.package.outputs.apworld_name }}
          if-no-files-found: error
          retention-days: 14

  release-apworld:
    if: needs.build-apworld.outputs.release_enabled == 'true'
    runs-on: ubuntu-latest
    needs: build-apworld
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Download built artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-apworld.outputs.apworld_name }}
          path: dist

      - name: Ensure tagged release exists
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.build-apworld.outputs.release_tag }}
          RELEASE_NAME: ${{ needs.build-apworld.outputs.release_name }}
        run: |
          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release ${RELEASE_TAG} already exists; preserving existing body/state."
          else
            gh api \
              -X POST \
              "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
              -f tag_name="${RELEASE_TAG}" \
              -f target_commitish="${GITHUB_SHA}" \
              --jq '.body' > release_notes.md

            gh release create "${RELEASE_TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${RELEASE_NAME}" \
              --draft \
              --notes-file release_notes.md
          fi

      - name: Prune non-APWorld assets from tagged release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.build-apworld.outputs.release_tag }}
          APWORLD_NAME: ${{ needs.build-apworld.outputs.apworld_name }}
        run: |
          gh release view "${RELEASE_TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --json assets \
            --jq '.assets[].name' | while IFS= read -r asset_name; do
              if [ -n "${asset_name}" ] && [ "${asset_name}" != "${APWORLD_NAME}" ]; then
                echo "Deleting prior release asset: ${asset_name}"
                gh release delete-asset "${RELEASE_TAG}" "${asset_name}" --repo "${GITHUB_REPOSITORY}" --yes
              fi
            done

      - name: Upload APWorld to tagged release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.build-apworld.outputs.release_tag }}
          APWORLD_NAME: ${{ needs.build-apworld.outputs.apworld_name }}
        run: |
          gh release upload "${RELEASE_TAG}" "dist/${APWORLD_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber

      - name: Verify release asset publication
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.build-apworld.outputs.release_tag }}
          APWORLD_NAME: ${{ needs.build-apworld.outputs.apworld_name }}
        run: |
          gh release view "${RELEASE_TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --json assets \
            --jq '.assets[].name' | grep -Fx "${APWORLD_NAME}"

      - name: Check out main for manifest version sync
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python for manifest version sync
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Create PR to sync world_version
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.build-apworld.outputs.release_tag }}
          RELEASE_VERSION: ${{ needs.build-apworld.outputs.version }}
        run: |
          python .github/scripts/kirbyam_release_metadata.py \
            --github-ref "refs/tags/${RELEASE_TAG}" \
            --world-manifest "worlds/kirbyam/archipelago.json"

          if git diff --quiet -- worlds/kirbyam/archipelago.json; then
            echo "worlds/kirbyam/archipelago.json already has world_version ${RELEASE_VERSION}; no sync commit needed"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          sync_branch="automation/kirbyam-world-version-${RELEASE_VERSION}"

          git checkout -B "${sync_branch}"
          git add worlds/kirbyam/archipelago.json
          git commit -m "KirbyAM: sync world_version to ${RELEASE_VERSION}"
          git push --force-with-lease origin "${sync_branch}:${sync_branch}"

          existing_pr_number="$(gh pr list \
            --repo "${GITHUB_REPOSITORY}" \
            --base main \
            --head "${sync_branch}" \
            --state open \
            --json number \
            --jq '.[0].number // empty')"

          if [ -n "${existing_pr_number}" ]; then
            echo "world_version sync PR #${existing_pr_number} already open for ${sync_branch}"
          else
            gh pr create \
              --repo "${GITHUB_REPOSITORY}" \
              --base main \
              --head "${sync_branch}" \
              --title "KirbyAM: sync world_version to ${RELEASE_VERSION}" \
              --body "Automated sync after tag ${RELEASE_TAG} to keep worlds/kirbyam/archipelago.json world_version current."
          fi
