name: KirbyAM APWorld

on:
  push:
    branches:
      - main
    tags:
      - "kirbyam-v*"
  pull_request:
    paths:
      - ".github/workflows/kirbyam-apworld.yml"
      - ".github/scripts/kirbyam_release_metadata.py"
      - "worlds/kirbyam/**"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-apworld:
    runs-on: ubuntu-latest
    outputs:
      apworld_name: ${{ steps.package.outputs.apworld_name }}
      release_name: ${{ steps.meta.outputs.release_name }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_enabled: ${{ steps.meta.outputs.release_enabled }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Show Python version
        run: |
          python --version

      - name: Prepare release metadata
        id: meta
        run: |
          python .github/scripts/kirbyam_release_metadata.py \
            --github-ref "${GITHUB_REF}" \
            --world-manifest "worlds/kirbyam/archipelago.json" \
            --changelog "worlds/kirbyam/CHANGELOG.md" \
            --github-output "${GITHUB_OUTPUT}"

      - name: Build kirbyam.apworld from source
        working-directory: worlds/kirbyam
        run: |
          python build.py --skip-patch
          if [ ! -f kirbyam.apworld ]; then
            echo "kirbyam.apworld was not created" >&2
            exit 1
          fi
          if [ ! -s data/base_patch.bsdiff4 ]; then
            echo "Committed data/base_patch.bsdiff4 is missing or empty" >&2
            exit 1
          fi
          ls -lh kirbyam.apworld data/base_patch.bsdiff4
          sha256sum kirbyam.apworld data/base_patch.bsdiff4

      - name: Stage artifact
        id: package
        shell: bash
        run: |
          mkdir -p dist
          cp worlds/kirbyam/kirbyam.apworld "dist/${{ steps.meta.outputs.apworld_name }}"
          ls -lh dist
          echo "apworld_name=${{ steps.meta.outputs.apworld_name }}" >> "${GITHUB_OUTPUT}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.apworld_name }}
          path: dist/${{ steps.package.outputs.apworld_name }}
          if-no-files-found: error
          retention-days: 14

  release-apworld:
    if: needs.build-apworld.outputs.release_enabled == 'true'
    runs-on: ubuntu-latest
    needs: build-apworld
    permissions:
      contents: write
    steps:
      - name: Download built artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-apworld.outputs.apworld_name }}
          path: dist

      - name: Ensure tagged release exists
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.build-apworld.outputs.release_tag }}
          RELEASE_NAME: ${{ needs.build-apworld.outputs.release_name }}
        run: |
          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release ${RELEASE_TAG} already exists; preserving existing body/state."
          else
            gh api \
              -X POST \
              "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
              -f tag_name="${RELEASE_TAG}" \
              -f target_commitish="${GITHUB_SHA}" \
              --jq '.body' > release_notes.md

            gh release create "${RELEASE_TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${RELEASE_NAME}" \
              --draft \
              --notes-file release_notes.md
          fi

      - name: Prune non-APWorld assets from tagged release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.build-apworld.outputs.release_tag }}
          APWORLD_NAME: ${{ needs.build-apworld.outputs.apworld_name }}
        run: |
          gh release view "${RELEASE_TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --json assets \
            --jq '.assets[].name' | while IFS= read -r asset_name; do
              if [ -n "${asset_name}" ] && [ "${asset_name}" != "${APWORLD_NAME}" ]; then
                echo "Deleting prior release asset: ${asset_name}"
                gh release delete-asset "${RELEASE_TAG}" "${asset_name}" --repo "${GITHUB_REPOSITORY}" --yes
              fi
            done

      - name: Upload APWorld to tagged release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.build-apworld.outputs.release_tag }}
          APWORLD_NAME: ${{ needs.build-apworld.outputs.apworld_name }}
        run: |
          gh release upload "${RELEASE_TAG}" "dist/${APWORLD_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber

      - name: Verify release asset publication
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.build-apworld.outputs.release_tag }}
          APWORLD_NAME: ${{ needs.build-apworld.outputs.apworld_name }}
        run: |
          gh release view "${RELEASE_TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --json assets \
            --jq '.assets[].name' | grep -Fx "${APWORLD_NAME}"
