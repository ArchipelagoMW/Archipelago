name: KirbyAM APWorld

on:
  push:
    branches:
      - main
    tags:
      - "kirbyam-v*"
  pull_request:
    paths:
      - ".github/workflows/kirbyam-apworld.yml"
      - ".github/scripts/kirbyam_release_metadata.py"
      - "worlds/kirbyam/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apworld:
    runs-on: ubuntu-latest
    outputs:
      apworld_name: ${{ steps.package.outputs.apworld_name }}
      release_name: ${{ steps.meta.outputs.release_name }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_enabled: ${{ steps.meta.outputs.release_enabled }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Show Python version
        run: |
          python --version

      - name: Prepare release metadata
        id: meta
        run: |
          python .github/scripts/kirbyam_release_metadata.py \
            --github-ref "${GITHUB_REF}" \
            --github-output "${GITHUB_OUTPUT}"

      - name: Build kirbyam.apworld
        working-directory: worlds/kirbyam
        run: |
          python build.py --skip-patch
          if [ ! -f kirbyam.apworld ]; then
            echo "kirbyam.apworld was not created" >&2
            exit 1
          fi
          ls -lh kirbyam.apworld

      - name: Stage artifact
        id: package
        shell: bash
        run: |
          mkdir -p dist
          cp worlds/kirbyam/kirbyam.apworld "dist/${{ steps.meta.outputs.apworld_name }}"
          ls -lh dist
          echo "apworld_name=${{ steps.meta.outputs.apworld_name }}" >> "${GITHUB_OUTPUT}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.apworld_name }}
          path: dist/${{ steps.package.outputs.apworld_name }}
          if-no-files-found: error
          retention-days: 14

  release-apworld:
    if: needs.build-apworld.outputs.release_enabled == 'true'
    runs-on: ubuntu-latest
    needs: build-apworld
    permissions:
      contents: write
    steps:
      - name: Download built artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-apworld.outputs.apworld_name }}
          path: dist

      - name: Publish release asset
        uses: softprops/action-gh-release@975c1b265e11dd76618af1c374e7981f9a6ff44a
        with:
          tag_name: ${{ needs.build-apworld.outputs.release_tag }}
          name: ${{ needs.build-apworld.outputs.release_name }}
          draft: true
          prerelease: false
          files: dist/${{ needs.build-apworld.outputs.apworld_name }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}